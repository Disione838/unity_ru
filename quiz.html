<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Викторина о России · День единения</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --accent:     #1a3f8f;
    --accent-dim: rgba(26,63,143,0.42);
    --accent-h:   #0d2660;
    --white:      #F7F9FF;
    --text-main:  #0A0C1C;
    --text-soft:  rgba(10,12,28,0.72);
    --text-muted: rgba(10,12,28,0.48);
    --card-border:rgba(26,63,143,0.26);
    --correct:    #1a7a3c;
    --wrong:      #8B0000;
    --correct-bg: rgba(0,152,73,0.11);
    --wrong-bg:   rgba(204,0,0,0.09);
    --num: 'DM Mono', monospace;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:#dde3f0;color:var(--text-main);font-family:'Times New Roman',serif;overflow-x:hidden;min-height:100vh}
  #bgCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}

  /* ── NAV ── */
  nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:0 44px;height:64px;background:rgba(247,249,255,.72);backdrop-filter:blur(18px);border-bottom:1px solid rgba(26,63,143,.18);transition:background .3s,box-shadow .3s}
  nav.scrolled{background:rgba(247,249,255,.96);box-shadow:0 2px 18px rgba(0,0,0,.08)}
  .nav-logo{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--text-main);display:flex;align-items:center;gap:10px;text-decoration:none}
  .nmf{width:22px;height:14px;border-radius:1px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 1px 4px rgba(0,0,0,.2);flex-shrink:0}
  .nmf-ru .a{flex:1;background:#fff}.nmf-ru .b{flex:1;background:#003580}.nmf-ru .c{flex:1;background:#CC0000}
  .nmf-by{position:relative}
  .nmf-by-bar{position:absolute;left:0;top:0;bottom:0;width:4px;background:repeating-linear-gradient(180deg,#CF101A 0 2px,#fff 2px 4px,#CF101A 4px 6px);z-index:1}
  .nmf-by-s{margin-left:4px;flex:1;display:flex;flex-direction:column}
  .nmf-by .a{flex:2;background:#CF101A}.nmf-by .b{flex:1;background:#009849}
  .nav-right{display:flex;align-items:center;gap:20px}
  .nav-home-link{font-size:13px;letter-spacing:.15em;text-transform:uppercase;color:var(--text-soft);text-decoration:none;position:relative;transition:color .2s;font-family:'Cormorant Garamond',serif}
  .nav-home-link::after{content:'';position:absolute;bottom:-2px;left:0;right:100%;height:1px;background:var(--accent);transition:right .3s}
  .nav-home-link:hover{color:var(--text-main)}.nav-home-link:hover::after{right:0}
  .nav-date{font-size:14px;letter-spacing:.22em;text-transform:uppercase;color:var(--accent);font-weight:600;font-family:'Times New Roman',serif}

  /* ── LAYOUT ── */
  .page{position:relative;z-index:1;min-height:100vh;display:none;flex-direction:column}
  .page.active{display:flex}
  .quiz-wrap{flex:1;display:flex;flex-direction:column;padding:100px 24px 80px;max-width:780px;margin:0 auto;width:100%}

  /* ── PROGRESS ── */
  .prog-wrap{margin-bottom:40px;opacity:0;animation:fadeUp .6s .1s forwards}
  .prog-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  .prog-cat{font-size:12px;letter-spacing:.42em;text-transform:uppercase;color:var(--accent)}
  .prog-num{font-family:var(--num);font-size:13px;color:var(--text-muted);letter-spacing:-.01em}
  .prog-bar{height:2px;background:rgba(26,63,143,.15);position:relative;overflow:hidden;border-radius:2px}
  .prog-fill{position:absolute;left:0;top:0;bottom:0;background:var(--accent);border-radius:2px;transition:width .5s cubic-bezier(.4,0,.2,1)}

  /* ── TIMER ── */
  .timer-bar-wrap{margin-bottom:18px;opacity:0;animation:fadeUp .6s .05s forwards}
  .timer-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
  .timer-label{font-size:11px;letter-spacing:.42em;text-transform:uppercase;color:var(--text-muted)}
  .timer-display{font-family:var(--num);font-size:22px;font-weight:500;color:var(--accent);letter-spacing:-.01em;transition:color .3s}
  .timer-display.warn{color:#b85c00}
  .timer-display.danger{color:var(--wrong);animation:timerPulse .6s ease-in-out infinite}
  .timer-track{height:3px;background:rgba(26,63,143,.13);border-radius:3px;overflow:hidden;position:relative}
  .timer-fill{position:absolute;left:0;top:0;bottom:0;background:var(--accent);border-radius:3px;transition:width 1s linear,background .3s}
  .timer-fill.warn{background:#b85c00}
  .timer-fill.danger{background:var(--wrong)}
  @keyframes timerPulse{0%,100%{opacity:1}50%{opacity:.45}}

  /* ── QUESTION CARD ── */
  .q-card{background:rgba(255,255,255,.62);backdrop-filter:blur(16px);border:1px solid var(--card-border);padding:52px 48px;position:relative;border-radius:10px;opacity:0;animation:fadeUp .6s .2s forwards}
  .q-card::before{content:'';position:absolute;inset:10px;border:1px solid rgba(26,63,143,.08);pointer-events:none;border-radius:4px}
  .qc{position:absolute;width:22px;height:22px;border-color:var(--accent-dim);border-style:solid}
  .qc.tl{top:14px;left:14px;border-width:1.5px 0 0 1.5px}
  .qc.tr{top:14px;right:14px;border-width:1.5px 1.5px 0 0}
  .qc.bl{bottom:14px;left:14px;border-width:0 0 1.5px 1.5px}
  .qc.br{bottom:14px;right:14px;border-width:0 1.5px 1.5px 0}
  .q-num{font-family:var(--num);font-size:11px;letter-spacing:.2em;color:var(--accent);margin-bottom:18px}
  .q-text{font-family:'Playfair Display',serif;font-size:clamp(20px,2.6vw,28px);font-weight:700;line-height:1.42;color:var(--text-main);margin-bottom:34px}
  .options{display:flex;flex-direction:column;gap:11px}
  .opt{display:flex;align-items:center;gap:16px;padding:16px 22px;background:rgba(255,255,255,.5);border:1.5px solid rgba(26,63,143,.18);cursor:pointer;font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--text-soft);text-align:left;transition:background .18s,border-color .18s,transform .18s,box-shadow .18s;border-radius:10px;word-break:break-word}
  .opt:hover:not(:disabled){background:rgba(255,255,255,.85);border-color:var(--accent);transform:translateX(4px);box-shadow:4px 0 18px rgba(26,63,143,.12)}
  .opt:disabled{cursor:default;transform:none!important}
  .opt.correct{background:var(--correct-bg);border-color:var(--correct);color:var(--correct)}
  .opt.wrong{background:var(--wrong-bg);border-color:var(--wrong);color:var(--wrong)}
  .opt.show-correct{background:var(--correct-bg);border-color:var(--correct);color:var(--correct)}
  .opt-l{width:30px;height:30px;border:1.5px solid currentColor;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;flex-shrink:0;border-radius:6px;transition:background .18s,color .18s;font-family:var(--num)}
  .opt.correct .opt-l,.opt.show-correct .opt-l{background:var(--correct);color:#fff;border-color:var(--correct)}
  .opt.wrong .opt-l{background:var(--wrong);color:#fff;border-color:var(--wrong)}
  .opt-icon{margin-left:auto;font-size:18px;flex-shrink:0}
  .feedback{margin-top:22px;padding:16px 22px;font-family:'Playfair Display',serif;font-size:17px;font-style:italic;line-height:1.6;opacity:0;transition:opacity .35s;border-left:3px solid transparent;border-radius:0 8px 8px 0}
  .feedback.show{opacity:1}
  .feedback.ok{border-color:var(--correct);color:var(--correct);background:var(--correct-bg)}
  .feedback.err{border-color:var(--wrong);color:var(--wrong);background:var(--wrong-bg)}
  .next-btn{margin-top:28px;align-self:flex-end;display:flex;align-items:center;gap:10px;font-family:'Playfair Display',serif;font-size:15px;font-weight:700;color:var(--text-main);background:rgba(255,255,255,.72);border:1.5px solid var(--accent-dim);padding:13px 34px;cursor:pointer;letter-spacing:.07em;transition:background .18s,border-color .18s,transform .18s,box-shadow .18s;border-radius:10px;opacity:0;pointer-events:none}
  .next-btn.show{opacity:1;animation:fadeUp .4s forwards;pointer-events:auto}
  .next-btn:hover{background:rgba(255,255,255,.97);border-color:var(--accent);transform:translateY(-2px);box-shadow:0 7px 24px rgba(26,63,143,.18)}
  .next-btn svg{width:16px;height:16px}

  /* ── CAT INTRO ── */
  .cat-intro{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px 0 60px;opacity:0;animation:fadeUp .7s .1s forwards}
  .cat-intro-icon{font-size:88px;margin-bottom:14px;animation:floatIcon 3s ease-in-out infinite;display:block}
  .cat-intro-eye{font-size:12px;letter-spacing:.45em;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
  .cat-intro-title{font-family:'Playfair Display',serif;font-size:clamp(28px,5vw,56px);font-weight:900;color:var(--text-main);margin-bottom:12px}
  .cat-intro-desc{font-size:19px;font-weight:300;color:var(--text-soft);max-width:460px;line-height:1.7;margin-bottom:36px}
  .cat-dots{display:flex;gap:8px;margin-bottom:38px}
  .cat-dot{height:3px;width:40px;background:rgba(26,63,143,.18);border-radius:2px;transition:background .3s}
  .cat-dot.done{background:var(--accent)}
  .cat-go{font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#F7F9FF;background:var(--accent);padding:15px 44px;border:none;cursor:pointer;letter-spacing:.1em;border-radius:10px;transition:background .2s,transform .2s,box-shadow .2s;box-shadow:0 5px 22px rgba(26,63,143,.28)}
  .cat-go:hover{background:var(--accent-h);transform:translateY(-2px);box-shadow:0 10px 30px rgba(26,63,143,.42)}

  /* ── RESULTS ── */
  .results-wrap{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:90px 24px 80px;text-align:center}
  .res-emoji{font-size:80px;margin-bottom:16px;animation:floatIcon 3s ease-in-out infinite;display:block}
  .res-title{font-family:'Playfair Display',serif;font-size:clamp(34px,6vw,72px);font-weight:900;line-height:1.08;color:var(--text-main);margin-bottom:8px}
  .res-title em{font-style:italic;color:#0a2a7a}
  .ring-wrap{position:relative;width:180px;height:180px;margin:32px auto}
  .ring-wrap svg{width:180px;height:180px;transform:rotate(-90deg)}
  .ring-bg{fill:none;stroke:rgba(26,63,143,.14);stroke-width:10}
  .ring-fg{fill:none;stroke:var(--accent);stroke-width:10;stroke-linecap:round;stroke-dasharray:502;stroke-dashoffset:502;transition:stroke-dashoffset 1.4s cubic-bezier(.4,0,.2,1) .5s}
  .ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .ring-n{font-family:var(--num);font-size:48px;font-weight:500;color:var(--text-main);letter-spacing:-.02em}
  .ring-of{font-size:12px;letter-spacing:.3em;color:var(--accent);text-transform:uppercase}
  .res-verdict{font-family:'Playfair Display',serif;font-size:clamp(20px,2.8vw,30px);font-style:italic;color:var(--text-soft);max-width:580px;margin:0 auto 32px}
  .medals{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;margin-bottom:30px}
  .medal{padding:7px 18px;font-size:13px;letter-spacing:.2em;text-transform:uppercase;border:1px solid var(--accent-dim);color:var(--accent);background:rgba(255,255,255,.42);backdrop-filter:blur(6px);border-radius:10px}
  .breakdown{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;width:100%;max-width:800px;margin:0 auto 36px}
  .bk-card{background:rgba(255,255,255,.55);backdrop-filter:blur(10px);border:1px solid var(--card-border);padding:20px 10px;text-align:center;border-radius:10px;min-width:0;overflow:hidden}
  .bk-icon{font-size:24px;margin-bottom:7px}
  .bk-cat{font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--accent);margin-bottom:5px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:block}
  .bk-score{font-family:var(--num);font-size:22px;font-weight:500;color:var(--text-main)}
  .pct-block{margin-bottom:36px}
  .pct-label{font-size:11px;letter-spacing:.45em;text-transform:uppercase;color:var(--accent);margin-bottom:12px}
  .pct-num{font-family:var(--num);font-size:clamp(52px,8vw,90px);font-weight:400;color:var(--text-main);line-height:1;letter-spacing:-.04em}
  .pct-sign{font-size:.38em;color:var(--accent);font-weight:300;vertical-align:super}
  .pct-bar-wrap{width:100%;max-width:380px;height:2px;background:rgba(26,63,143,.13);margin:14px auto 0;border-radius:2px;overflow:hidden}
  .pct-bar{height:100%;background:var(--accent);width:0%;border-radius:2px;transition:width 1.2s cubic-bezier(.4,0,.2,1) .8s}
  .res-btns{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-bottom:12px}
  .btn-primary{display:inline-flex;align-items:center;gap:10px;font-family:'Playfair Display',serif;font-size:16px;font-weight:700;color:#F7F9FF;background:var(--accent);padding:16px 44px;border:none;cursor:pointer;letter-spacing:.06em;border-radius:10px;box-shadow:0 7px 26px rgba(26,63,143,.28);transition:background .2s,transform .2s,box-shadow .2s;text-decoration:none}
  .btn-primary:hover{background:var(--accent-h);transform:translateY(-2px);box-shadow:0 12px 36px rgba(26,63,143,.42)}
  .btn-outline{display:inline-flex;align-items:center;gap:8px;font-family:'Cormorant Garamond',serif;font-size:16px;color:var(--text-soft);background:rgba(255,255,255,.55);border:1.5px solid var(--accent-dim);padding:16px 36px;cursor:pointer;border-radius:10px;transition:background .18s,border-color .18s;text-decoration:none}
  .btn-outline:hover{background:rgba(255,255,255,.9);border-color:var(--accent)}
  .res-sub{font-size:14px;color:var(--text-muted);letter-spacing:.2em}

  /* ── LEADERBOARD ── */
  .lb-section{width:100%;max-width:800px;margin:0 auto 36px;opacity:0;animation:fadeUp .6s .6s forwards}
  .lb-title{font-family:'Playfair Display',serif;font-size:22px;font-weight:700;color:var(--text-main);margin-bottom:16px;text-align:left}
  .lb-table{width:100%;border-collapse:collapse}
  .lb-table th{font-size:10px;letter-spacing:.38em;text-transform:uppercase;color:var(--accent);padding:8px 12px;text-align:left;border-bottom:1px solid var(--card-border)}
  .lb-table td{padding:10px 12px;font-size:17px;font-weight:300;color:var(--text-soft);border-bottom:1px solid rgba(26,63,143,.07)}
  .lb-table tr:first-child td{color:var(--text-main);font-weight:600}
  .lb-rank{font-family:'DM Mono',monospace;font-size:13px;color:var(--accent);width:32px}
  .lb-save-msg{font-size:14px;color:var(--accent);letter-spacing:.14em;margin-top:12px;opacity:0;animation:fadeUp .5s .4s forwards}
  /* User nav */
  .nav-user{display:flex;align-items:center;gap:10px}
  .nav-user-name{font-size:13px;letter-spacing:.08em;color:var(--text-soft);font-family:'Cormorant Garamond',serif;font-weight:600;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .nav-user-btn{font-size:12px;letter-spacing:.12em;text-transform:uppercase;padding:7px 14px;border:1px solid var(--card-border);background:rgba(255,255,255,.45);color:var(--text-soft);border-radius:8px;cursor:pointer;text-decoration:none;font-family:'Cormorant Garamond',serif;font-weight:600;transition:background .2s}
  .nav-user-btn:hover{background:rgba(255,255,255,.85)}

  /* ── FOOTER ── */
  footer{position:relative;z-index:1;padding:36px 24px;text-align:center;border-top:1px solid rgba(26,63,143,.16);background:rgba(255,255,255,.3);backdrop-filter:blur(10px)}
  footer p{font-size:14px;color:var(--text-muted);letter-spacing:.05em;line-height:2.1}

  /* ── ANIMS ── */
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  @keyframes floatIcon{0%,100%{transform:translateY(0) rotate(-3deg)}50%{transform:translateY(-11px) rotate(3deg)}}

  @media(max-width:600px){
    nav{padding:0 18px}
    .nav-date{display:none}
    .quiz-wrap{padding:90px 16px 60px}
    .q-card{padding:28px 18px}
    .breakdown{grid-template-columns:repeat(3,1fr)}
    .res-btns{flex-direction:column;align-items:center}
    .results-wrap{padding:80px 16px 60px}
  }
  @media(max-width:380px){.breakdown{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>

<canvas id="bgCanvas"></canvas>

<!-- NAV -->
<nav id="mainNav">
  <a href="index.html" class="nav-logo">
    <div style="display:flex;gap:3px;align-items:center">
      <div class="nmf nmf-ru"><div class="a"></div><div class="b"></div><div class="c"></div></div>
      <div class="nmf nmf-by">
        <div class="nmf-by-bar"></div>
        <div class="nmf-by-s"><div class="a"></div><div class="b"></div></div>
      </div>
    </div>
    День единения
  </a>
  <div class="nav-right">
    <a href="index.html" class="nav-home-link">← Главная</a>
    <div id="navUserArea" class="nav-user"></div>
    <div class="nav-date">2 апреля</div>
  </div>
</nav>

<!-- QUIZ PAGE -->
<div class="page active" id="quizPage">
  <div class="quiz-wrap" id="quizWrap"></div>
  <footer>
    <p>ВИКТОРИНА РАСЧИТАНА НА ОДНО ПРОХОЖДЕНИЕ!</p>
  </footer>
</div>

<!-- RESULTS PAGE -->
<div class="page" id="resultsPage">
  <div class="results-wrap" id="resultsWrap"></div>
  <footer>
    <p>С уважением колледжи России</p>
  </footer>
</div>

<script src="auth.js"></script>
<script>
/* ════════ BACKGROUND (Russian palette) ════════ */
const canvas=document.getElementById('bgCanvas'),ctx=canvas.getContext('2d');
let W,H,tick=0;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
function blob(x,y,r,R,G,B,a){const g=ctx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,`rgba(${R},${G},${B},${a})`);g.addColorStop(1,`rgba(${R},${G},${B},0)`);ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();}
class Sparkle{constructor(){this.reset(true);}reset(rand){this.x=Math.random()*(W||800);this.y=rand?Math.random()*(H||600):(H||600)+10;this.vy=-(Math.random()*.28+.06);this.vx=(Math.random()-.5)*.18;this.r=Math.random()*1.3+.3;this.life=0;this.maxLife=Math.random()*900+500;this.maxA=Math.random()*.4+.08;this.blue=Math.random()>.38;}step(){this.x+=this.vx;this.y+=this.vy;this.life++;const t=this.life/this.maxLife;this.alpha=t<.2?(t/.2)*this.maxA:t>.8?((1-t)/.2)*this.maxA:this.maxA;if(this.life>=this.maxLife||this.y<-10)this.reset(false);ctx.save();ctx.globalAlpha=this.alpha;ctx.beginPath();ctx.arc(this.x,this.y,this.r,0,Math.PI*2);ctx.fillStyle=this.blue?'#1a3f8f':'rgba(200,215,255,.9)';ctx.fill();ctx.restore();}}
const sparkles=Array.from({length:160},()=>new Sparkle());
(function loop(){tick++;const s=Math.sin(tick*.0007),c=Math.cos(tick*.0005),s2=Math.sin(tick*.0011),c2=Math.cos(tick*.0009);
ctx.clearRect(0,0,W,H);ctx.fillStyle='#D8E0F0';ctx.fillRect(0,0,W,H);
blob(W*(.12+s*.10),H*(.20+c*.10),W*.50,0,53,128,.25);
blob(W*(.10+c*.07),H*(.78+s*.08),W*.36,204,0,0,.20);
blob(W*(.50+s2*.05),H*(.08+c2*.06),W*.40,200,210,240,.32);
blob(W*(.82+c*.08),H*(.30+s*.10),W*.48,0,53,128,.28);
blob(W*(.85+s2*.07),H*(.82+c2*.06),W*.36,204,0,0,.20);
const gw=ctx.createRadialGradient(W/2,H*.48,0,W/2,H*.48,W*.52);
gw.addColorStop(0,'rgba(235,240,255,.80)');gw.addColorStop(.55,'rgba(235,240,255,.30)');gw.addColorStop(1,'rgba(235,240,255,0)');
ctx.fillStyle=gw;ctx.fillRect(0,0,W,H);sparkles.forEach(p=>p.step());requestAnimationFrame(loop);})();

const nav=document.getElementById('mainNav');
window.addEventListener('scroll',()=>nav.classList.toggle('scrolled',scrollY>40));

/* ════════ DATA — RUSSIA ════════ */
const cats=[
  {id:'landmarks',icon:'🏛️',name:'Достопримечательности',desc:'Площади, соборы и архитектурные сокровища России',
   qs:[
    {q:'Как называется главная площадь Москвы, где находится Кремль?',opts:['Дворцовая площадь','Красная площадь','Площадь Согласия'],a:1},
    {q:'В каком городе находится Эрмитаж — один из крупнейших художественных музеев мира?',opts:['Москва','Казань','Санкт-Петербург'],a:2},
    {q:'Этот храм с разноцветными «луковичными» куполами на Красной площади стал символом России:',opts:['Исаакиевский собор','Храм Василия Блаженного','Храм Христа Спасителя'],a:1},
    {q:'Петергоф знаменит на весь мир своей уникальной системой...',opts:['Подземных метро','Фонтанов','Крепостных валов'],a:1},
   ]},
  {id:'places',icon:'🌍',name:'Популярные места',desc:'Природные чудеса и знаковые маршруты страны',
   qs:[
    {q:'Как называется самое глубокое озеро в мире, расположенное в Восточной Сибири?',opts:['Ладожское озеро','Озеро Байкал','Онежское озеро'],a:1},
    {q:'Туристический маршрут, проходящий по древним городам Северо-Восточной Руси, называется:',opts:['Серебряное копытце','Золотое кольцо','Великий шёлковый путь'],a:1},
    {q:'Регион на Дальнем Востоке, знаменитый своими действующими вулканами и гейзерами:',opts:['Камчатка','Алтай','Карелия'],a:0},
    {q:'В каком городе прошли Зимние Олимпийские игры 2014 года?',opts:['Москва','Екатеринбург','Сочи'],a:2},
   ]},
  {id:'food',icon:'🍽️',name:'Кулинария',desc:'Классические блюда и вкусы русской кухни',
   qs:[
    {q:'Какое блюдо из теста с мясной начинкой считается одним из главных в русской кухне?',opts:['Хинкали','Пельмени','Драники'],a:1},
    {q:'Традиционный русский суп из капусты называется...',opts:['Борщ','Щи','Солянка'],a:1},
    {q:'Какое лакомство принято печь в России на праздник Масленицы?',opts:['Круассаны','Пончики','Блины'],a:2},
    {q:'Знаменитый «печатный» медовый пряник чаще всего привозят из города...',opts:['Тула','Владимир','Суздаль'],a:0},
   ]},
  {id:'traditions',icon:'🎭',name:'Традиции',desc:'Народные промыслы, ремёсла и символы России',
   qs:[
    {q:'Как называется знаменитая русская деревянная кукла, внутри которой прячутся куклы поменьше?',opts:['Неваляшка','Матрёшка','Чебурашка'],a:1},
    {q:'Традиционный сосуд для нагревания воды и приготовления чая — это...',opts:['Котелок','Самовар','Кувшин'],a:1},
    {q:'Роспись по дереву с использованием чёрного, красного и золотого цветов называется:',opts:['Гжель','Хохлома','Жостово'],a:1},
    {q:'Старинная русская зимняя обувь, свалянная из овечьей шерсти:',opts:['Лапти','Сапоги','Валенки'],a:2},
   ]},
  {id:'holidays',icon:'🎆',name:'Праздники',desc:'Народные торжества и государственные даты России',
   qs:[
    {q:'Главный праздник весны, который отмечается 9 мая в честь окончания Великой Отечественной войны:',opts:['День России','День Победы','День защитника Отечества'],a:1},
    {q:'В какой праздник принято провожать зиму, устраивать народные гулянья и сжигать чучело?',opts:['Пасха','Масленица','Рождество'],a:1},
    {q:'Кто является главным сказочным персонажем, приносящим подарки детям в России на Новый год?',opts:['Санта-Клаус','Дед Мороз','Святой Николай'],a:1},
    {q:'Государственный праздник, отмечаемый 12 июня в честь принятия суверенитета страны:',opts:['День народного единства','День конституции','День России'],a:2},
   ]},
];
const TOTAL=cats.reduce((s,c)=>s+c.qs.length,0);

/* ════════ STATE ════════ */
let S={catI:0,qI:0,answered:false,scores:[],correct:0,phase:'intro'};
let prevCorrect=0;
let quizStartTime = Date.now();

/* ════════ TIMER ════════ */
const QUIZ_DURATION = 4 * 60; // 4 minutes in seconds
let timerInterval = null;
let timerSecondsLeft = QUIZ_DURATION;
let timerStarted = false;

function startTimer() {
  if (timerStarted) return;
  timerStarted = true;
  timerSecondsLeft = QUIZ_DURATION;
  quizStartTime = Date.now();
  timerInterval = setInterval(tickTimer, 1000);
}

function stopTimer() {
  if (timerInterval) { clearInterval(timerInterval); timerInterval = null; }
}

function tickTimer() {
  timerSecondsLeft--;
  updateTimerUI();
  if (timerSecondsLeft <= 0) {
    stopTimer();
    // Time's up — auto finish
    showResults(true);
  }
}

function updateTimerUI() {
  const disp = document.getElementById('timerDisplay');
  const fill = document.getElementById('timerFill');
  if (!disp) return;
  const mins = Math.floor(timerSecondsLeft / 60);
  const secs = timerSecondsLeft % 60;
  disp.textContent = `${mins}:${String(secs).padStart(2,'0')}`;
  const pct = (timerSecondsLeft / QUIZ_DURATION) * 100;
  if (fill) fill.style.width = pct + '%';
  const isWarn = timerSecondsLeft <= 60 && timerSecondsLeft > 20;
  const isDanger = timerSecondsLeft <= 20;
  disp.className = 'timer-display' + (isDanger ? ' danger' : isWarn ? ' warn' : '');
  if (fill) fill.className = 'timer-fill' + (isDanger ? ' danger' : isWarn ? ' warn' : '');
}

// Require auth
if (!requireAuth()) { /* redirected */ }

/* ════════ RENDER ════════ */
function render(){
  const wrap=document.getElementById('quizWrap');
  const cat=cats[S.catI];
  const doneQ=cats.slice(0,S.catI).reduce((a,c)=>a+c.qs.length,0)+S.qI;
  if(S.phase==='intro') renderIntro(wrap,cat,doneQ);
  else { renderQ(wrap,cat,doneQ); updateTimerUI(); }
}

function renderIntro(wrap,cat,doneQ){
  const dotsHTML=cat.qs.map((_,i)=>`<div class="cat-dot${i<S.qI?' done':''}"></div>`).join('');
  wrap.innerHTML=`
    <div class="cat-intro">
      <span class="cat-intro-icon">${cat.icon}</span>
      <div class="cat-intro-eye">Раздел ${S.catI+1} из ${cats.length}</div>
      <h2 class="cat-intro-title">${cat.name}</h2>
      <p class="cat-intro-desc">${cat.desc}</p>
      <div class="cat-dots">${dotsHTML}</div>
      <button class="cat-go" onclick="startCat()">${S.qI===0?'Начать раздел →':'Продолжить →'}</button>
    </div>`;
}

function renderQ(wrap,cat,doneQ){
  const q=cat.qs[S.qI];
  const pct=(doneQ/TOTAL*100).toFixed(1);
  const letters=['А','Б','В'];
  wrap.innerHTML=`
    <div class="prog-wrap">
      <div class="prog-head">
        <span class="prog-cat">${cat.icon} ${cat.name}</span>
        <span class="prog-num">${doneQ+1} / ${TOTAL}</span>
      </div>
      <div class="prog-bar"><div class="prog-fill" style="width:${pct}%"></div></div>
    </div>
    <div class="timer-bar-wrap" id="timerBarWrap">
      <div class="timer-row">
        <span class="timer-label">⏱ Осталось времени</span>
        <span class="timer-display" id="timerDisplay">4:00</span>
      </div>
      <div class="timer-track"><div class="timer-fill" id="timerFill" style="width:100%"></div></div>
    </div>
    <div class="q-card">
      <div class="qc tl"></div><div class="qc tr"></div>
      <div class="qc bl"></div><div class="qc br"></div>
      <div class="q-num">${String(doneQ+1).padStart(2,'0')} · РАЗДЕЛ ${S.catI+1}</div>
      <div class="q-text">${q.q}</div>
      <div class="options" id="opts">
        ${q.opts.map((o,i)=>`
          <button class="opt" id="opt${i}" onclick="pick(${i})">
            <div class="opt-l">${letters[i]}</div>
            <span>${o}</span>
            <span class="opt-icon" id="ic${i}"></span>
          </button>`).join('')}
      </div>
      <div class="feedback" id="fb"></div>
    </div>
    <button class="next-btn" id="nxt" onclick="next()">
      ${isLast()?'Завершить':'Следующий'} &nbsp;
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>`;
}

function isLast(){return S.catI===cats.length-1&&S.qI===cats[S.catI].qs.length-1;}
function startCat(){S.phase='q'; startTimer(); render();}

function pick(chosen){
  if(S.answered)return;
  S.answered=true;
  const q=cats[S.catI].qs[S.qI];
  const ok=chosen===q.a;
  if(ok)S.correct++;
  const fbok=['✦ Верно!','✦ Отличный ответ!','✦ Так держать!','✦ Блестяще!','✦ Правильно!'];
  const fberr=[`✦ Правильный ответ: «${q.opts[q.a]}»`,`✦ Верно было бы «${q.opts[q.a]}» — запомните!`,`✦ Не совсем так. Правильно: «${q.opts[q.a]}»`];
  document.querySelectorAll('.opt').forEach((b,i)=>{
    b.disabled=true;
    if(i===q.a){b.classList.add(i===chosen?'correct':'show-correct');document.getElementById('ic'+i).textContent='✓';}
    else if(i===chosen&&!ok){b.classList.add('wrong');document.getElementById('ic'+i).textContent='✗';}
  });
  const fb=document.getElementById('fb');
  fb.textContent=ok?fbok[Math.floor(Math.random()*fbok.length)]:fberr[Math.floor(Math.random()*fberr.length)];
  fb.className=`feedback show ${ok?'ok':'err'}`;
  setTimeout(()=>{const n=document.getElementById('nxt');if(n)n.classList.add('show');},400);
}

function next(){
  const cat=cats[S.catI];
  if(S.qI===cat.qs.length-1){
    const sc=S.correct-prevCorrect;prevCorrect=S.correct;
    S.scores.push({sc,total:cat.qs.length});
    if(S.catI===cats.length-1){showResults();return;}
    S.catI++;S.qI=0;S.answered=false;S.phase='intro';
  } else {
    S.qI++;S.answered=false;S.phase='q';
  }
  render();window.scrollTo(0,0);
}

/* ════════ RESULTS ════════ */
async function showResults(timedOut = false){
  stopTimer();
  document.getElementById('quizPage').classList.remove('active');
  const rp=document.getElementById('resultsPage');
  rp.classList.add('active');
  window.scrollTo(0,0);
  const pct=Math.round(S.correct/TOTAL*100);
  const timeMs = Date.now() - quizStartTime;
  let verdict,emoji;
  if(timedOut){verdict='Время вышло! Но вы успели набрать очки.';emoji='⏰';}
  else if(pct===100){verdict='Вы — настоящий эксперт по России! Браво!';emoji='🏆';}
  else if(pct>=80){verdict='Отличный результат! Россия вами гордится.';emoji='🥇';}
  else if(pct>=60){verdict='Хороший знаток! Ещё немного — и вы эксперт.';emoji='🥈';}
  else if(pct>=40){verdict='Неплохое начало. Приезжайте в Россию — узнаете больше!';emoji='🥉';}
  else{verdict='Много предстоит узнать. Но это только начало!';emoji='📚';}
  const medals=[];
  if(S.correct===TOTAL)medals.push('✦ Идеальный результат');
  if(pct>=80)medals.push('✦ Знаток России');
  if(S.scores.some(s=>s.sc===s.total))medals.push('✦ Мастер категории');
  const C=2*Math.PI*80;
  const mins = Math.floor(timeMs/60000), secs = Math.floor((timeMs%60000)/1000);
  const timeStr = `${mins}:${String(secs).padStart(2,'0')}`;
  const wrap=document.getElementById('resultsWrap');
  wrap.innerHTML=`
    <div style="opacity:0;animation:fadeUp .8s .1s forwards;width:100%;max-width:800px;margin:0 auto">
      <span class="res-emoji">${emoji}</span>
      <h2 class="res-title">${timedOut?'Время<br><em>вышло!</em>':'Викторина<br><em>завершена!</em>'}</h2>
      <div class="ring-wrap">
        <svg viewBox="0 0 180 180"><circle class="ring-bg" cx="90" cy="90" r="80"/><circle class="ring-fg" id="rfg" cx="90" cy="90" r="80" style="stroke-dasharray:${C};stroke-dashoffset:${C}"/></svg>
        <div class="ring-inner"><div class="ring-n">${S.correct}</div><div class="ring-of">из ${TOTAL}</div></div>
      </div>
      <p class="res-verdict">${verdict}</p>
      <p style="font-size:15px;letter-spacing:.2em;color:var(--text-muted);margin-bottom:12px">⏱ Время: ${timeStr}</p>
      ${medals.length?`<div class="medals">${medals.map(m=>`<div class="medal">${m}</div>`).join('')}</div>`:''}
      <div class="breakdown" id="bk"></div>
      <div class="pct-block">
        <div class="pct-label">Ваш результат</div>
        <div class="pct-num">${pct}<span class="pct-sign">%</span></div>
        <div class="pct-bar-wrap"><div class="pct-bar" id="pb"></div></div>
      </div>
      <div id="saveMsgArea"></div>
      <div id="lbArea" class="lb-section">
        <div class="lb-title">🏅 Таблица лидеров</div>
        <div id="lbContent" style="color:var(--text-muted);font-size:16px">Загружаем…</div>
      </div>
      <div class="res-btns">
        <a href="index.html" class="btn-outline">← На главную</a>
      </div>
      <p class="res-sub">Делитесь знаниями о России!</p>
    </div>`;
  setTimeout(()=>{
    const r=document.getElementById('rfg');if(r)r.style.strokeDashoffset=C*(1-S.correct/TOTAL);
    const p=document.getElementById('pb');if(p)p.style.width=pct+'%';
  },300);
  const bk=document.getElementById('bk');
  if(bk)bk.innerHTML=cats.map((c,i)=>{
    const s=S.scores[i]||{sc:0,total:c.qs.length};
    const star=s.sc===s.total?'⭐':s.sc>=s.total/2?'✦':'·';
    return`<div class="bk-card" style="opacity:0;animation:fadeUp .6s ${.3+i*.1}s forwards">
      <div class="bk-icon">${c.icon}</div>
      <div class="bk-cat">${c.name}</div>
      <div class="bk-score">${s.sc}<span style="font-size:15px;color:var(--text-muted);font-weight:300"> / ${s.total}</span></div>
      <div style="margin-top:6px;font-size:18px">${star}</div>
    </div>`;
  }).join('');

  // Save result
  const saveR = await saveQuizResult(S.correct, TOTAL, timeMs);
  const saveArea = document.getElementById('saveMsgArea');
  if (saveR && saveR.ok) {
    saveArea.innerHTML = `<p class="lb-save-msg" style="opacity:1">✦ Результат сохранён!</p>`;
  }

  // Load leaderboard
  loadLeaderboard();
}

function restart(){
  stopTimer();
  timerStarted = false;
  timerSecondsLeft = QUIZ_DURATION;
  S={catI:0,qI:0,answered:false,scores:[],correct:0,phase:'intro'};
  prevCorrect=0;
  quizStartTime = Date.now();
  document.getElementById('resultsPage').classList.remove('active');
  document.getElementById('quizPage').classList.add('active');
  window.scrollTo(0,0);
  render();
}

async function loadLeaderboard() {
  const lb = document.getElementById('lbContent');
  if (!lb) return;
  try {
    // quiz_leaderboard — view с GRANT SELECT TO anon, authenticated
    // Поля: username, score, total, time_ms, completed_at
    const r = await sbFetch('quiz_leaderboard?select=username,score,total,time_ms&order=score.desc,time_ms.asc&limit=20');
    const rows = r.data;
    if (!rows || rows.length === 0) {
      lb.innerHTML = '<p style="color:var(--text-muted);font-size:16px">Пока нет результатов. Будьте первым!</p>';
      return;
    }
    const medals = ['🥇','🥈','🥉'];
    lb.innerHTML = `<table class="lb-table">
      <thead><tr><th class="lb-rank">#</th><th>Участник</th><th>Правильных</th><th>Процент</th><th>Время</th></tr></thead>
      <tbody>${rows.map((row, i) => {
        const username = row.username || 'Аноним';
        const pct = Math.round(row.score / row.total * 100);
        const mins = Math.floor(row.time_ms / 60000);
        const secs = Math.floor((row.time_ms % 60000) / 1000);
        const time = `${mins}:${String(secs).padStart(2, '0')}`;
        const medal = medals[i] !== undefined ? medals[i] : (i + 1);
        return `<tr><td class="lb-rank">${medal}</td><td>${username}</td><td>${row.score}/${row.total}</td><td>${pct}%</td><td>${time}</td></tr>`;
      }).join('')}</tbody>
    </table>`;
  } catch(e) {
    lb.innerHTML = '<p style="color:var(--text-muted);font-size:15px">Не удалось загрузить таблицу.</p>';
  }
}

// Init user nav
(function(){
  const u = getUser();
  const area = document.getElementById('navUserArea');
  if (u) {
    const name = (u.user_metadata && u.user_metadata.username) || u.email.split('@')[0];
    area.innerHTML = `<span class="nav-user-name">👤 ${name}</span><button class="nav-user-btn" onclick="doLogout()">Выйти</button>`;
  }
  async function doLogout(){ await signOut(); window.location.href='auth.html'; }
  window.doLogout = doLogout;
})();

// ── Проверяем, проходил ли пользователь тест ──
async function checkAlreadyPlayed() {
  const user = getUser();
  if (!user) { render(); return; }
  try {
    // Ищем любой результат текущего пользователя
    const r = await sbFetch(`quiz_results?select=score,total,time_ms,completed_at&user_id=eq.${user.id}&order=completed_at.asc&limit=1`);
    if (r.data && r.data.length > 0) {
      // Уже проходил — показываем экран "уже сыграно"
      showAlreadyPlayed(r.data[0]);
    } else {
      render();
    }
  } catch(e) {
    render();
  }
}

function showAlreadyPlayed(result) {
  document.getElementById('quizPage').classList.remove('active');
  const rp = document.getElementById('resultsPage');
  rp.classList.add('active');
  window.scrollTo(0,0);
  const pct = Math.round(result.score / result.total * 100);
  const mins = Math.floor(result.time_ms / 60000);
  const secs = Math.floor((result.time_ms % 60000) / 1000);
  const timeStr = `${mins}:${String(secs).padStart(2,'0')}`;
  const C = 2 * Math.PI * 80;
  const wrap = document.getElementById('resultsWrap');
  wrap.innerHTML = `
    <div style="opacity:0;animation:fadeUp .8s .1s forwards;width:100%;max-width:800px;margin:0 auto">
      <span class="res-emoji">🔒</span>
      <h2 class="res-title">Вы уже<br><em>участвовали!</em></h2>
      <p class="res-verdict" style="margin-top:16px">Викторина рассчитана на однократное прохождение.<br>Ваш результат уже сохранён в таблице лидеров.</p>
      <div class="ring-wrap">
        <svg viewBox="0 0 180 180"><circle class="ring-bg" cx="90" cy="90" r="80"/><circle class="ring-fg" id="rfg" cx="90" cy="90" r="80" style="stroke-dasharray:${C};stroke-dashoffset:${C}"/></svg>
        <div class="ring-inner"><div class="ring-n">${result.score}</div><div class="ring-of">из ${result.total}</div></div>
      </div>
      <p style="font-size:15px;letter-spacing:.2em;color:var(--text-muted);margin-bottom:32px">⏱ Ваше время: ${timeStr} &nbsp;·&nbsp; ${pct}%</p>
      <div id="lbArea" class="lb-section">
        <div class="lb-title">🏅 Таблица лидеров</div>
        <div id="lbContent" style="color:var(--text-muted);font-size:16px">Загружаем…</div>
      </div>
      <div class="res-btns">
        <a href="index.html" class="btn-outline">← На главную</a>
      </div>
      <p class="res-sub">Делитесь знаниями о России!</p>
    </div>`;
  setTimeout(() => {
    const r = document.getElementById('rfg');
    if (r) r.style.strokeDashoffset = C * (1 - result.score / result.total);
  }, 300);
  loadLeaderboard();
}

checkAlreadyPlayed();
</script>
