<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Вход · День единения народов</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root{
    --accent:#1a3f8f; --accent-h:#0d2660; --accent-dim:rgba(26,63,143,.38);
    --text-main:#0A0C1C; --text-soft:rgba(10,12,28,.72); --text-muted:rgba(10,12,28,.44);
    --card-border:rgba(26,63,143,.22); --correct:#1a7a3c; --wrong:#8B0000;
  }
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;scroll-behavior:smooth}
  body{background:#dde3f0;color:var(--text-main);font-family:'Cormorant Garamond',serif;display:flex;align-items:center;justify-content:center;min-height:100vh;padding:24px}
  #bgCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}

  .auth-outer{position:relative;z-index:1;width:100%;max-width:480px}

  .auth-logo{text-align:center;margin-bottom:36px;opacity:0;animation:fadeUp .7s .1s forwards}
  .auth-logo a{font-family:'Playfair Display',serif;font-size:17px;font-weight:700;color:var(--text-main);text-decoration:none;display:inline-flex;align-items:center;gap:10px}
  .nmf{width:22px;height:14px;border-radius:1px;overflow:hidden;display:flex;flex-direction:column;box-shadow:0 1px 4px rgba(0,0,0,.2);flex-shrink:0}
  .nmf-ru .a{flex:1;background:#fff}.nmf-ru .b{flex:1;background:#003580}.nmf-ru .c{flex:1;background:#CC0000}
  .nmf-by{position:relative}
  .nmf-by-bar{position:absolute;left:0;top:0;bottom:0;width:4px;background:repeating-linear-gradient(180deg,#CF101A 0 2px,#fff 2px 4px,#CF101A 4px 6px);z-index:1}
  .nmf-by-s{margin-left:4px;flex:1;display:flex;flex-direction:column}.nmf-by .a{flex:2;background:#CF101A}.nmf-by .b{flex:1;background:#009849}

  .auth-card{background:rgba(255,255,255,.60);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--card-border);border-radius:16px;padding:48px 44px;position:relative;opacity:0;animation:fadeUp .7s .2s forwards;box-shadow:0 20px 60px rgba(26,63,143,.12)}
  .auth-card::before{content:'';position:absolute;inset:12px;border:1px solid rgba(26,63,143,.07);pointer-events:none;border-radius:8px}
  .qc{position:absolute;width:20px;height:20px;border-color:var(--accent-dim);border-style:solid}
  .qc.tl{top:16px;left:16px;border-width:1.5px 0 0 1.5px}.qc.tr{top:16px;right:16px;border-width:1.5px 1.5px 0 0}
  .qc.bl{bottom:16px;left:16px;border-width:0 0 1.5px 1.5px}.qc.br{bottom:16px;right:16px;border-width:0 1.5px 1.5px 0}

  .tabs{display:flex;gap:0;margin-bottom:36px;border:1px solid var(--card-border);border-radius:10px;overflow:hidden}
  .tab-btn{flex:1;padding:13px;font-family:'Playfair Display',serif;font-size:15px;font-weight:700;letter-spacing:.05em;border:none;background:transparent;color:var(--text-muted);cursor:pointer;transition:all .2s}
  .tab-btn.active{background:var(--accent);color:#fff}

  .form-group{margin-bottom:20px}
  .form-label{display:block;font-size:11px;letter-spacing:.38em;text-transform:uppercase;color:var(--accent);margin-bottom:8px}
  .form-input{width:100%;padding:13px 16px;background:rgba(255,255,255,.55);border:1.5px solid var(--card-border);border-radius:10px;font-family:'Cormorant Garamond',serif;font-size:18px;color:var(--text-main);outline:none;transition:border-color .2s,box-shadow .2s}
  .form-input:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(26,63,143,.1)}
  .form-input::placeholder{color:var(--text-muted)}

  .btn-submit{width:100%;padding:16px;background:var(--accent);color:#fff;border:none;border-radius:10px;font-family:'Playfair Display',serif;font-size:16px;font-weight:700;letter-spacing:.07em;cursor:pointer;transition:background .2s,transform .2s,box-shadow .2s;box-shadow:0 5px 22px rgba(26,63,143,.28);margin-top:8px}
  .btn-submit:hover{background:var(--accent-h);transform:translateY(-2px);box-shadow:0 10px 32px rgba(26,63,143,.38)}
  .btn-submit:disabled{opacity:.6;cursor:default;transform:none}

  .msg{margin-top:16px;padding:12px 16px;border-radius:8px;font-size:16px;font-weight:300;display:none;border-left:3px solid}
  .msg.error{display:block;background:rgba(204,0,0,.08);border-color:var(--wrong);color:var(--wrong)}
  .msg.success{display:block;background:rgba(26,122,60,.08);border-color:var(--correct);color:var(--correct)}

  .auth-footer{text-align:center;margin-top:24px;font-size:15px;color:var(--text-muted);opacity:0;animation:fadeUp .7s .4s forwards}
  .auth-footer a{color:var(--accent);text-decoration:none}

  .divider{display:flex;align-items:center;gap:12px;margin:24px 0;color:var(--text-muted);font-size:12px;letter-spacing:.3em;text-transform:uppercase}
  .divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--card-border)}

  /* Verification notice */
  .verify-notice{text-align:center;padding:32px 0 8px}
  .verify-icon{font-size:56px;margin-bottom:16px;display:block;animation:floatIcon 3s ease-in-out infinite}
  .verify-title{font-family:'Playfair Display',serif;font-size:26px;font-weight:700;color:var(--text-main);margin-bottom:10px}
  .verify-sub{font-size:17px;font-weight:300;color:var(--text-soft);line-height:1.7}

  @keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
  @keyframes floatIcon{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<div class="auth-outer">
  <div class="auth-logo">
    <a href="index.html">
      <div style="display:flex;gap:3px;align-items:center">
        <div class="nmf nmf-ru"><div class="a"></div><div class="b"></div><div class="c"></div></div>
        <div class="nmf nmf-by"><div class="nmf-by-bar"></div><div class="nmf-by-s"><div class="a"></div><div class="b"></div></div></div>
      </div>
      День единения
    </a>
  </div>

  <div class="auth-card" id="authCard">
    <div class="qc tl"></div><div class="qc tr"></div><div class="qc bl"></div><div class="qc br"></div>

    <!-- TABS -->
    <div class="tabs">
      <button class="tab-btn active" id="tabLogin" onclick="switchTab('login')">Вход</button>
      <button class="tab-btn" id="tabReg" onclick="switchTab('register')">Регистрация</button>
    </div>

    <!-- LOGIN FORM -->
    <div id="formLogin">
      <div class="form-group">
        <label class="form-label" for="loginEmail">Email</label>
        <input class="form-input" id="loginEmail" type="email" placeholder="example@mail.ru" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="loginPass">Пароль</label>
        <input class="form-input" id="loginPass" type="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <div class="msg" id="loginMsg"></div>
      <button class="btn-submit" id="loginBtn" onclick="doLogin()">Войти</button>
    </div>

    <!-- REGISTER FORM -->
    <div id="formReg" style="display:none">
      <div class="form-group">
        <label class="form-label" for="regName">Имя пользователя</label>
        <input class="form-input" id="regName" type="text" placeholder="Иван Иванов" autocomplete="nickname">
      </div>
      <div class="form-group">
        <label class="form-label" for="regEmail">Email</label>
        <input class="form-input" id="regEmail" type="email" placeholder="example@mail.ru" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label" for="regPass">Пароль</label>
        <input class="form-input" id="regPass" type="password" placeholder="Минимум 6 символов" autocomplete="new-password">
      </div>
      <div class="msg" id="regMsg"></div>
      <button class="btn-submit" id="regBtn" onclick="doRegister()">Создать аккаунт</button>
    </div>

    <!-- VERIFY NOTICE (shown after registration) -->
    <div id="verifyNotice" style="display:none">
      <div class="verify-notice">
        <span class="verify-icon">📬</span>
        <div class="verify-title">Проверьте почту!</div>
        <p class="verify-sub">Мы отправили письмо с подтверждением. После подтверждения вернитесь сюда и войдите.</p>
      </div>
      <div class="divider">или</div>
      <button class="btn-submit" onclick="switchTab('login')">Перейти ко входу</button>
    </div>
  </div>

  <div class="auth-footer">
    <a href="index.html">← Вернуться на главную</a>
  </div>
</div>

<script src="auth.js"></script>
<script>
// Background (same as index)
const canvas=document.getElementById('bgCanvas'),ctx=canvas.getContext('2d');
let W,H,tick=0;
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
function blob(x,y,r,R,G,B,a){const g=ctx.createRadialGradient(x,y,0,x,y,r);g.addColorStop(0,`rgba(${R},${G},${B},${a})`);g.addColorStop(1,`rgba(${R},${G},${B},0)`);ctx.fillStyle=g;ctx.beginPath();ctx.arc(x,y,r,0,Math.PI*2);ctx.fill();}
(function loop(){tick++;const s=Math.sin(tick*.0007),c=Math.cos(tick*.0005),s2=Math.sin(tick*.0011),c2=Math.cos(tick*.0009);
ctx.clearRect(0,0,W,H);ctx.fillStyle='#D8E0F0';ctx.fillRect(0,0,W,H);
blob(W*(.12+s*.10),H*(.20+c*.10),W*.50,0,53,128,.25);
blob(W*(.10+c*.07),H*(.78+s*.08),W*.36,204,0,0,.20);
blob(W*(.50+s2*.05),H*(.08+c2*.06),W*.40,200,210,240,.32);
blob(W*(.82+c*.08),H*(.30+s*.10),W*.48,0,53,128,.28);
blob(W*(.85+s2*.07),H*(.82+c2*.06),W*.36,204,0,0,.20);
const gw=ctx.createRadialGradient(W/2,H*.48,0,W/2,H*.48,W*.52);
gw.addColorStop(0,'rgba(235,240,255,.80)');gw.addColorStop(.55,'rgba(235,240,255,.30)');gw.addColorStop(1,'rgba(235,240,255,0)');
ctx.fillStyle=gw;ctx.fillRect(0,0,W,H);requestAnimationFrame(loop);})();

// Redirect if already logged in
const u = getUser();
if (u && getToken()) {
  const params = new URLSearchParams(window.location.search);
  window.location.href = params.get('redirect') || 'index.html';
}

function switchTab(tab) {
  document.getElementById('tabLogin').classList.toggle('active', tab==='login');
  document.getElementById('tabReg').classList.toggle('active', tab==='register');
  document.getElementById('formLogin').style.display = tab==='login' ? '' : 'none';
  document.getElementById('formReg').style.display = tab==='register' ? '' : 'none';
  document.getElementById('verifyNotice').style.display = 'none';
}

function showMsg(id, text, type='error') {
  const el = document.getElementById(id);
  el.textContent = text;
  el.className = `msg ${type}`;
}

async function doLogin() {
  const email = document.getElementById('loginEmail').value.trim();
  const pass  = document.getElementById('loginPass').value;
  if (!email || !pass) { showMsg('loginMsg', 'Заполните все поля'); return; }
  const btn = document.getElementById('loginBtn');
  btn.disabled = true; btn.textContent = 'Входим…';
  const { error } = await signIn(email, pass);
  btn.disabled = false; btn.textContent = 'Войти';
  if (error) { showMsg('loginMsg', error); return; }
  const params = new URLSearchParams(window.location.search);
  window.location.href = decodeURIComponent(params.get('redirect') || 'index.html');
}

async function doRegister() {
  const name  = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pass  = document.getElementById('regPass').value;
  if (!name || !email || !pass) { showMsg('regMsg', 'Заполните все поля'); return; }
  if (pass.length < 6) { showMsg('regMsg', 'Пароль должен быть не менее 6 символов'); return; }
  const btn = document.getElementById('regBtn');
  btn.disabled = true; btn.textContent = 'Создаём аккаунт…';
  const { error, data } = await signUp(email, pass, name);
  btn.disabled = false; btn.textContent = 'Создать аккаунт';
  if (error) { showMsg('regMsg', error); return; }
  // If email confirmation is required
  if (data && !data.access_token) {
    document.getElementById('formReg').style.display = 'none';
    document.getElementById('verifyNotice').style.display = '';
  } else {
    // Auto-login success
    const params = new URLSearchParams(window.location.search);
    window.location.href = decodeURIComponent(params.get('redirect') || 'index.html');
  }
}

// Allow Enter key
document.addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  if (document.getElementById('formLogin').style.display !== 'none') doLogin();
  else doRegister();
});
</script>
</body>
</html>
